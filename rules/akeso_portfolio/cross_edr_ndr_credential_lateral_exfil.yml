title: Cross-Source Attack Chain - Credential Theft to Lateral Movement to Data Exfiltration
id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f01
status: experimental
description: |
  Three-stage cross-source temporal correlation:
  1. EDR detects credential theft (LSASS access, mimikatz, sekurlsa)
  2. NDR detects lateral movement (SMB write or RDP connection from same source IP)
  3. EDR detects outbound data transfer to an external IP from same source IP

  All three stages must occur in order within 30 minutes, correlated by
  source.ip. This pattern represents a complete intrusion lifecycle spanning
  two products (EDR + NDR), from credential harvesting through exfiltration.
references:
  - https://attack.mitre.org/tactics/TA0006/  # Credential Access
  - https://attack.mitre.org/tactics/TA0008/  # Lateral Movement
  - https://attack.mitre.org/tactics/TA0010/  # Exfiltration
author: AkesoSIEM
date: 2026/03/16
tags:
  - attack.credential_access
  - attack.t1003
  - attack.lateral_movement
  - attack.t1021.002
  - attack.exfiltration
  - attack.t1041
  - sentinel.cross_portfolio
  - sentinel.edr_ndr
level: critical
falsepositives:
  - Extremely unlikely due to requiring three ordered stages from two products within 30 minutes

# --- Component rules ---

# Stage 1: EDR credential theft (LSASS access / mimikatz)
---
title: EDR Credential Theft Detected
id: d4e5f6a7-b8c9-4d0e-1f2a-a00000000001
status: experimental
logsource:
  product: akeso_edr
detection:
  selection:
    event.action|contains:
      - lsass
      - credential
      - sekurlsa
      - mimikatz
  condition: selection

# Stage 2: NDR lateral movement (SMB or RDP from same source IP)
---
title: NDR Lateral Movement Detected
id: d4e5f6a7-b8c9-4d0e-1f2a-a00000000002
status: experimental
logsource:
  product: akeso_ndr
detection:
  selection:
    event.action|contains:
      - smb_write
      - smb_session
      - rdp_connect
      - lateral
  condition: selection

# Stage 3: EDR outbound data exfiltration
---
title: EDR Outbound Data Transfer
id: d4e5f6a7-b8c9-4d0e-1f2a-a00000000003
status: experimental
logsource:
  product: akeso_edr
detection:
  selection:
    event.action|contains:
      - outbound_transfer
      - exfiltration
      - data_staging
      - large_upload
  condition: selection

# Correlation: all three stages from same source IP within 30 minutes
---
title: Cross-Source Credential Theft to Lateral Movement to Exfiltration
id: d4e5f6a7-b8c9-4d0e-1f2a-a00000000004
type: correlation
status: experimental
rules:
  - d4e5f6a7-b8c9-4d0e-1f2a-a00000000001
  - d4e5f6a7-b8c9-4d0e-1f2a-a00000000002
  - d4e5f6a7-b8c9-4d0e-1f2a-a00000000003
group-by:
  - source.ip
timespan: 30m
ordered: true
condition:
  gte: 3
level: critical
